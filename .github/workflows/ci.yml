name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Restore dependencies
      run: dotnet restore SaaS.slnx
      
    - name: Build
      run: dotnet build SaaS.slnx --no-restore
      
    - name: Test
      run: dotnet test SaaS.slnx --no-build --verbosity normal

  frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        
    - name: Install dependencies
      run: pnpm install
      working-directory: ./frontend
      
    - name: Build
      run: pnpm run build
      working-directory: ./frontend
